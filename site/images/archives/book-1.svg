<svg viewBox="0 0 240 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Silence of the Mountains book cover">
  <defs>
    <linearGradient id="cover1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#fb7185" />
    </linearGradient>
  </defs>
  <rect width="240" height="320" rx="24" ry="24" fill="url(#cover1)" />
  <rect x="16" y="16" width="208" height="288" rx="20" ry="20" fill="rgba(255,255,255,0.12)" />
  <text x="120" y="120" fill="#ffffff" font-family="Inter, sans-serif" font-size="20" font-weight="700" text-anchor="middle">Silence</text>
  <text x="120" y="150" fill="#ffffff" font-family="Inter, sans-serif" font-size="20" font-weight="700" text-anchor="middle">of the</text>
